language = "C"
include_guard = "VMCORE_H"
autogen_warning = "/* Auto-generated by cbindgen. Do not edit. */"
no_includes = true
sys_includes = ["stdint.h", "stdbool.h", "stddef.h"]

[export]
prefix = "Hcv"
include = [
    "ErrorCode",
    "VmState",
    "VCpuState",
    "MemoryRegion",
    "VCpuRegs",
    "VCpuSRegs",
    "SegmentReg",
    "VirtioBlkConfig",
    "VirtioBlkStats",
    "EventType",
    "Event",
]

[export.rename]
"EventRingHandle" = "HcvEventRingHandle"

[enum]
rename_variants = "QualifiedScreamingSnakeCase"

[fn]
rename_args = "None"
