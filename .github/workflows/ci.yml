name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  GOTOOLCHAIN: local

jobs:
  rust-lint:
    name: Rust Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy, rustfmt }
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    name: Rust Test
    runs-on: ubuntu-24.04
    needs: rust-lint
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace -- --test-threads=1
      - run: cargo build --workspace --release

  rust-coverage:
    name: Rust Coverage
    runs-on: ubuntu-24.04
    needs: rust-test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-tarpaulin
      - run: cargo tarpaulin --workspace --out xml --output-dir target/coverage -- --test-threads=1
      - uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: target/coverage/cobertura.xml

  go-lint:
    name: Go Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }
      - run: cd controller && go vet ./...
      - uses: golangci/golangci-lint-action@v6
        with: { version: latest, working-directory: controller }

  go-test:
    name: Go Test
    runs-on: ubuntu-24.04
    needs: go-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }
      - run: cd controller && go test -race -count=1 -coverprofile=coverage.out ./...
      - uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: controller/coverage.out

  e2e:
    name: E2E Integration
    runs-on: ubuntu-24.04
    needs: [rust-test, go-test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p vmcore --release
      - run: cd controller && go test -race -count=1 -v -run TestE2E ./tests/...

  security:
    name: Security Audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }
      - run: cargo install cargo-audit && cargo audit
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest && cd controller && govulncheck ./...

  build-artifacts:
    name: Build Release
    runs-on: ubuntu-24.04
    needs: e2e
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --release
      - run: cd controller && go build -ldflags="-s -w" -o ../target/hcv-controller ./cmd/controller
      - run: cd controller && go build -ldflags="-s -w" -o ../target/hcvctl ./cmd/hcvctl
      - uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: |
            target/release/libvmcore.a
            target/hcv-controller
            target/hcvctl
