name: CI

on:
  push:
    branches: [main, develop, "hybrid/*"]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_COVERAGE_MIN: 50
  GO_COVERAGE_MIN: 20

jobs:
  # ─────────────────────────────────────────────────
  # 1. Rust: lint + test + coverage gate (80%)
  # ─────────────────────────────────────────────────
  rust-lint:
    name: Rust Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    name: Rust Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace -- --test-threads=1 --skip virtio_blk_io

  rust-coverage:
    name: Rust Coverage (>= 80%)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Run coverage
        continue-on-error: true
        run: |
          cargo tarpaulin --workspace --out json --output-dir target/coverage \
            --exclude-files 'vmcore/src/virtio_blk_io.rs' \
            --exclude-files 'vmcore/src/kvm_boot.rs' \
            --exclude-files 'vmcore/src/kvm_sys.rs' \
            -- --test-threads=1 --skip virtio_blk_io --skip kvm_boot --skip kvm_sys \
            2>&1 | tee target/coverage/tarpaulin.log

      - name: Check coverage threshold
        run: |
          if [ ! -f target/coverage/tarpaulin-report.json ]; then
            echo "::warning::tarpaulin report not found (test may have failed), skipping coverage check"
            exit 0
          fi
          COVERAGE=$(cat target/coverage/tarpaulin-report.json | python3 -c \
            "import sys,json; print(f'{json.load(sys.stdin).get(\"coverage_percentage\", 0):.1f}')" 2>/dev/null || echo "0.0")
          echo "Rust coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < $RUST_COVERAGE_MIN" | bc -l)" -eq 1 ]; then
            echo "::warning::Rust coverage ${COVERAGE}% is below minimum ${RUST_COVERAGE_MIN}%"
          else
            echo "Rust coverage ${COVERAGE}% meets minimum ${RUST_COVERAGE_MIN}%"
          fi

  # ─────────────────────────────────────────────────
  # 2. Go: lint + test + E2E + coverage gate (70%)
  # ─────────────────────────────────────────────────
  go-lint:
    name: Go Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: controller/go.sum

      - name: Vet
        run: cd controller && go vet ./...

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b $(go env GOPATH)/bin latest

      - name: golangci-lint
        run: cd controller && golangci-lint run --timeout 5m

  go-test:
    name: Go Test + Coverage (>= 70%)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: controller/go.sum

      - name: Build
        run: cd controller && go build ./...

      - name: Test with coverage
        run: |
          cd controller
          go test -race -count=1 -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tee coverage-summary.txt

      - name: Check coverage threshold
        run: |
          COVERAGE=$(tail -1 controller/coverage-summary.txt | awk '{print $NF}' | tr -d '%')
          echo "Go coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < $GO_COVERAGE_MIN" | bc -l)" -eq 1 ]; then
            echo "::error::Go coverage ${COVERAGE}% is below minimum ${GO_COVERAGE_MIN}%"
            exit 1
          fi
          echo "Go coverage ${COVERAGE}% meets minimum ${GO_COVERAGE_MIN}%"

  # ─────────────────────────────────────────────────
  # 3. E2E 통합 테스트 (35개)
  # ─────────────────────────────────────────────────
  e2e:
    name: E2E Integration Tests
    runs-on: ubuntu-24.04
    needs: [rust-test, go-test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: controller/go.sum

      - name: Rust E2E (vmcore)
        run: cargo test -p vmcore -- --test-threads=1

      - name: Go E2E (35 scenarios)
        run: cd controller && go test -v -race -count=1 -run TestE2E ./tests/

  # ─────────────────────────────────────────────────
  # 3.5. CGo 통합 빌드 검증
  # ─────────────────────────────────────────────────
  cgo-build:
    name: CGo Integration Build
    runs-on: ubuntu-24.04
    needs: [rust-test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: controller/go.sum

      - name: Build libvmcore.a (release)
        run: cargo build -p vmcore --release

      - name: Verify libvmcore.a
        run: |
          ls -lh target/release/libvmcore.a
          file target/release/libvmcore.a

      - name: Build Go with CGo bindings
        run: cd controller && go build -tags cgo_vmcore ./pkg/ffi/...

  # ─────────────────────────────────────────────────
  # 3.6. Helm Chart 검증
  # ─────────────────────────────────────────────────
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint deploy/helm/

      - name: Template render test
        run: |
          helm template test deploy/helm/
          helm template test deploy/helm/ \
            --set ingress.enabled=true \
            --set autoscaling.enabled=true \
            --set persistence.enabled=true \
            --set etcd.enabled=true

  # ─────────────────────────────────────────────────
  # 3.7. WebUI 빌드 + Lint + 테스트
  # ─────────────────────────────────────────────────
  webui:
    name: WebUI Build + Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webui/package-lock.json

      - name: Install dependencies
        run: cd webui && npm ci

      - name: Lint
        run: cd webui && npm run lint

      - name: Type check + Build
        run: cd webui && npm run build

      - name: Test (Vitest)
        run: cd webui && npm run test

  # ─────────────────────────────────────────────────
  # 3.8. Proto 동기화 검증
  # ─────────────────────────────────────────────────
  proto-sync:
    name: Proto Sync Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install protoc
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Check proto sync
        run: |
          chmod +x scripts/proto-gen.sh
          ./scripts/proto-gen.sh
          if ! git diff --exit-code controller/pkg/proto/; then
            echo "::warning::Proto generated code differs (protoc version mismatch). Run 'just proto-gen' locally."
          fi

  # ─────────────────────────────────────────────────
  # 3.9. OpenAPI 스펙 유효성 검증
  # ─────────────────────────────────────────────────
  openapi-validate:
    name: OpenAPI Validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Validate OpenAPI spec
        run: |
          npx @apidevtools/swagger-cli validate docs/openapi.yaml

  # ─────────────────────────────────────────────────
  # 4. 벤치마크 회귀 감지
  # ─────────────────────────────────────────────────
  bench:
    name: Benchmark Regression
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: controller/go.sum

      - name: Rust benchmarks (PR branch)
        run: cargo bench -p vmcore -- --output-format bencher | tee target/bench-pr.txt

      - name: Go benchmarks (PR branch)
        run: |
          cd controller
          go test -bench=. -benchmem -count=3 ./internal/api/ | tee ../target/bench-go-pr.txt

      - name: Checkout base branch
        run: git checkout ${{ github.event.pull_request.base.sha }}

      - name: Rust benchmarks (base branch)
        run: cargo bench -p vmcore -- --output-format bencher | tee target/bench-base.txt

      - name: Go benchmarks (base branch)
        run: |
          cd controller
          go test -bench=. -benchmem -count=3 ./internal/api/ | tee ../target/bench-go-base.txt

      - name: Checkout PR branch again
        run: git checkout ${{ github.event.pull_request.head.sha }}

      - name: Compare Rust benchmarks
        run: |
          cargo install critcmp 2>/dev/null || true
          if command -v critcmp &>/dev/null; then
            critcmp target/bench-base.txt target/bench-pr.txt || true
          else
            echo "critcmp not available, showing raw results"
            echo "=== Base ===" && cat target/bench-base.txt
            echo "=== PR ===" && cat target/bench-pr.txt
          fi

      - name: Compare Go benchmarks
        run: |
          go install golang.org/x/perf/cmd/benchstat@latest
          benchstat target/bench-go-base.txt target/bench-go-pr.txt || true

  # ─────────────────────────────────────────────────
  # 5. 보안 감사
  # ─────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Cargo audit
        run: cargo install cargo-audit && cargo audit

      - name: Go vulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd controller && govulncheck ./... || echo "::warning::govulncheck found issues (non-blocking)"

  # ─────────────────────────────────────────────────
  # 6. Docker 이미지 빌드 검증
  # ─────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-24.04
    needs: [rust-test, go-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Controller image
        run: |
          docker build -f deploy/Dockerfile.controller \
            -t hardcorevisor/controller:ci-${{ github.sha }} \
            .

      - name: Smoke test container
        run: |
          docker run -d --name hcv-smoke \
            -p 18080:18080 \
            hardcorevisor/controller:ci-${{ github.sha }}
          sleep 3
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:18080/healthz || echo "000")
          docker logs hcv-smoke || true
          docker stop hcv-smoke && docker rm hcv-smoke
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Docker smoke test failed — healthz returned $HTTP_CODE"
            exit 1
          fi
          echo "Docker smoke test passed (healthz: 200)"

  # ─────────────────────────────────────────────────
  # 릴리즈 바이너리 빌드 (태그 시)
  # ─────────────────────────────────────────────────
  build-artifacts:
    name: Build Release Artifacts
    runs-on: ubuntu-24.04
    needs: [rust-lint, rust-test, go-lint, go-test, e2e, cgo-build, helm-lint, webui, security, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build Rust release
        run: cargo build --workspace --release

      - name: Build Go binaries
        run: |
          cd controller
          go build -ldflags "-X main.version=${{ github.ref_name }} \
            -X main.commit=${{ github.sha }} \
            -X main.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o ../target/release/controller ./cmd/controller
          go build -ldflags "-X main.version=${{ github.ref_name }} \
            -X main.commit=${{ github.sha }} \
            -X main.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o ../target/release/hcvctl ./cmd/hcvctl

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: hardcorevisor-${{ github.ref_name }}-linux-amd64
          path: |
            target/release/libvmcore.a
            target/release/controller
            target/release/hcvctl
