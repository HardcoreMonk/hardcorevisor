name: Release

on:
  push:
    tags: ['v*']

env:
  GOTOOLCHAIN: local
  REGISTRY: ghcr.io

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }
      - uses: Swatinem/rust-cache@v2

      - name: Build Rust
        run: cargo build --workspace --release

      - name: Build Go
        run: |
          cd controller
          CGO_ENABLED=0 go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o ../target/hcv-controller ./cmd/controller
          CGO_ENABLED=0 go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o ../target/hcvctl ./cmd/hcvctl

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/libvmcore.a
            target/hcv-controller
            target/hcvctl
          generate_release_notes: true

      # ── GHCR Docker 이미지 push ──
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.controller
          push: true
          tags: |
            ghcr.io/hardcoremonk/hardcorevisor:${{ github.ref_name }}
            ghcr.io/hardcoremonk/hardcorevisor:latest
