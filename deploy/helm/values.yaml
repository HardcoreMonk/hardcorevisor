replicaCount: 1

image:
  repository: hardcorevisor/controller
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  httpPort: 18080
  grpcPort: 19090

config:
  logLevel: info
  logFormat: text
  etcdEndpoints: ""
  storageDriver: memory
  peripheralDriver: memory

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# ── Ingress ──
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts: []
  #  - host: hcv.example.com
  tls: []
  #  - secretName: hcv-tls
  #    hosts: [hcv.example.com]

# ── Autoscaling ──
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPU: 70
  targetMemory: 80

# ── Persistence ──
persistence:
  enabled: false
  size: 1Gi
  storageClass: ""

# ── Secrets ──
secrets:
  jwtSecret: ""
  rbacUsers: ""

# ── Network Policy ──
networkPolicy:
  enabled: false

# ── Prometheus ServiceMonitor ──
serviceMonitor:
  enabled: false
  interval: "15s"

# ── etcd ──
etcd:
  enabled: true
  image: quay.io/coreos/etcd:v3.5.17
  storageSize: 1Gi
  storageClass: ""

# ── Prometheus ──
prometheus:
  enabled: true
  image: prom/prometheus:v2.54.0

# ── Grafana ──
grafana:
  enabled: true
  image: grafana/grafana:11.2.0
  adminPassword: admin
