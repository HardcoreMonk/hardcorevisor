replicaCount: 1

image:
  repository: hardcorevisor/controller
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  httpPort: 8080
  grpcPort: 9090

config:
  logLevel: info
  logFormat: text
  etcdEndpoints: ""
  storageDriver: memory
  peripheralDriver: memory

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

etcd:
  enabled: true
  image: quay.io/coreos/etcd:v3.5.17

prometheus:
  enabled: true
  image: prom/prometheus:v2.54.0

grafana:
  enabled: true
  image: grafana/grafana:11.2.0
  adminPassword: admin
