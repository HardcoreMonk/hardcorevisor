{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "hardcorevisor.fullname" . }}
  labels:
    {{- include "hardcorevisor.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "hardcorevisor.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval | default "15s" }}
{{- end }}
