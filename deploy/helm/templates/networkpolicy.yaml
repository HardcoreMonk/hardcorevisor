{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "hardcorevisor.fullname" . }}
  labels:
    {{- include "hardcorevisor.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "hardcorevisor.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: {{ .Values.service.httpPort }}
          protocol: TCP
        - port: {{ .Values.service.grpcPort }}
          protocol: TCP
  egress:
    - ports:
        - port: 2379
          protocol: TCP
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
