apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-controller
  labels:
    {{- include "hardcorevisor.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "hardcorevisor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hardcorevisor.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "hardcorevisor.fullname" . }}
      containers:
        - name: controller
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 18080
              name: http
            - containerPort: 19090
              name: grpc
          env:
            - name: HCV_API_ADDR
              value: ":18080"
            - name: HCV_GRPC_ADDR
              value: ":19090"
            - name: HCV_LOG_LEVEL
              value: {{ .Values.config.logLevel }}
            - name: HCV_LOG_FORMAT
              value: {{ .Values.config.logFormat }}
            - name: HCV_ETCD_ENDPOINTS
              value: {{ .Values.config.etcdEndpoints | default (printf "%s-etcd:2379" .Release.Name) }}
            - name: HCV_STORAGE_DRIVER
              value: {{ .Values.config.storageDriver }}
            - name: HCV_PERIPHERAL_DRIVER
              value: {{ .Values.config.peripheralDriver }}
            {{- if .Values.secrets.jwtSecret }}
            - name: HCV_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "hardcorevisor.fullname" . }}
                  key: jwt-secret
            {{- end }}
            {{- if .Values.secrets.rbacUsers }}
            - name: HCV_RBAC_USERS
              valueFrom:
                secretKeyRef:
                  name: {{ include "hardcorevisor.fullname" . }}
                  key: rbac-users
            {{- end }}
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 10
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/hardcorevisor
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "hardcorevisor.fullname" . }}-data
      {{- end }}
