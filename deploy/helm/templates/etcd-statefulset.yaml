{{- if .Values.etcd.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-etcd
  labels:
    {{- include "hardcorevisor.labels" . | nindent 4 }}
    app.kubernetes.io/component: etcd
spec:
  serviceName: {{ .Release.Name }}-etcd
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: etcd
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: etcd
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: etcd
          image: {{ .Values.etcd.image }}
          command:
            - etcd
            - --data-dir=/data
            - --listen-client-urls=http://0.0.0.0:2379
            - --advertise-client-urls=http://{{ .Release.Name }}-etcd:2379
          ports:
            - containerPort: 2379
              name: client
          livenessProbe:
            httpGet:
              path: /health
              port: 2379
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 2379
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.etcd.storageClass }}
        storageClassName: {{ .Values.etcd.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.etcd.storageSize | default "1Gi" }}
{{- end }}
