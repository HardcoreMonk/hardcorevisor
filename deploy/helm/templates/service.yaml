apiVersion: v1
kind: Service
metadata:
  name: {{ include "hardcorevisor.fullname" . }}-controller
  labels:
    {{- include "hardcorevisor.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.httpPort }}
      targetPort: http
      name: http
    - port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      name: grpc
  selector:
    {{- include "hardcorevisor.selectorLabels" . | nindent 4 }}
