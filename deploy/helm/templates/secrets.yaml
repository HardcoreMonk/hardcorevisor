{{- if or .Values.secrets.jwtSecret .Values.secrets.rbacUsers }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hardcorevisor.fullname" . }}
  labels:
    {{- include "hardcorevisor.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.jwtSecret }}
  jwt-secret: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.rbacUsers }}
  rbac-users: {{ .Values.secrets.rbacUsers | b64enc | quote }}
  {{- end }}
{{- end }}
