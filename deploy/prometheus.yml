# HardCoreVisor Prometheus Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: "hcv-controller"
    static_configs:
      - targets: ["controller:18080"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "etcd"
    static_configs:
      - targets: ["etcd:2379"]
    metrics_path: /metrics
