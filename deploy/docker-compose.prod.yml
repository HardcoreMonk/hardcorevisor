# HardCoreVisor Production Docker Compose Overlay
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Requires .env file with secrets (copy from .env.example):
#   cp .env.example .env && edit .env

services:
  etcd:
    restart: always
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 256m
    healthcheck:
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  prometheus:
    restart: always
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"
        reservations:
          memory: 512m
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
      - --storage.tsdb.wal-compression

  grafana:
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_LOG_MODE=console
      - GF_LOG_LEVEL=warn
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
        reservations:
          memory: 128m

  controller:
    restart: always
    environment:
      - HCV_API_ADDR=:18080
      - HCV_GRPC_ADDR=:19090
      - HCV_ETCD_ENDPOINTS=http://etcd:2379
      - HCV_LOG_LEVEL=info
      - HCV_LOG_FORMAT=json
      - HCV_JWT_SECRET=${HCV_JWT_SECRET}
      - HCV_TLS_CERT=/etc/hardcorevisor/tls/server.pem
      - HCV_TLS_KEY=/etc/hardcorevisor/tls/server-key.pem
    volumes:
      - ./tls:/etc/hardcorevisor/tls:ro
      - hcv-data:/var/lib/hardcorevisor
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 256m
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:18080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  alertmanager:
    restart: always
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  loki:
    restart: always
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "0.5"

  promtail:
    restart: always
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

volumes:
  hcv-data:
