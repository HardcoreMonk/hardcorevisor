global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://controller:18080/api/v1/webhooks/alert'
        send_resolved: true

  - name: 'critical'
    webhook_configs:
      - url: 'http://controller:18080/api/v1/webhooks/alert'
        send_resolved: true
