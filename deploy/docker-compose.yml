# HardCoreVisor Development Stack
# Usage: docker compose -f deploy/docker-compose.yml up -d
#
# Services:
#   etcd       - Distributed state store (port 2379)
#   prometheus - Metrics collection (port 9090)
#   grafana    - Dashboards (port 3000, admin/admin)
#   controller - Go Controller (REST 18080, gRPC 19090) [build from source]

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: hcv-etcd
    command:
      - etcd
      - --name=hcv-etcd-0
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
    ports:
      - "2379:2379"
    volumes:
      - etcd-data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: hcv-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    depends_on:
      - etcd
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: hcv-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  controller:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.controller
    container_name: hcv-controller
    ports:
      - "18080:18080"
      - "19090:19090"
    environment:
      - HCV_API_ADDR=:18080
      - HCV_GRPC_ADDR=:19090
      - HCV_ETCD_ENDPOINTS=http://etcd:2379
      - HCV_LOG_LEVEL=info
    depends_on:
      etcd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:18080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: hcv-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    container_name: hcv-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.0.0
    container_name: hcv-promtail
    volumes:
      - ./promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  etcd-data:
  prometheus-data:
  grafana-data:
  loki-data:
