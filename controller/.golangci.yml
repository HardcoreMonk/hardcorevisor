version: "2"

linters-settings:
  errcheck:
    exclude-functions:
      - (io.Closer).Close
      - (*os.File).Close
      - (net/http.ResponseWriter).Write
      - fmt.Fprintln
      - fmt.Fprintf
      - fmt.Printf

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
  disable:
    - depguard
